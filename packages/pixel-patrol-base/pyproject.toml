[project]
name = "pixel-patrol-base"
version = "0.7.0"
description = "Image prevalidation tool"
readme = "README.md"
license = { file = "LICENSE" }
authors = [
    { name = "Helmholtz Imaging Engineering & Support Unit MDC" }
]
requires-python = ">=3.11"

dependencies = [
    "click>=8.2.1",
    "packaging>=21.0",
    "matplotlib>=3.10.3", # TODO: Are we sure we need it in base?
    "polars>=1.31.0",
    "pyarrow>=21.0.0",
    "pyyaml>=6.0.2",
    "statsmodels>=0.14.4",
    "dask[distributed]>=2025.5.1",
    "duckdb>=1.2.0",
    "psutil>=6.0.0",
    "tqdm>=4.67.1",
    "yaspin>=3.4.0",
]

[project.urls]
Homepage = "https://ida-mdc.github.io/pixel-patrol/"
Repository = "https://github.com/ida-mdc/pixel-patrol"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv]
package = true

[tool.setuptools]
license-files = ["LICENSE", "NOTICE", "THIRD_PARTY_LICENSES.md"]
include-package-data = true

[tool.setuptools.package-data]
"pixel_patrol_base.report" = ["assets/*.png"]
"pixel_patrol_base" = ["viewer_dist/**/*", "viewer/**/*", "launch_assets/**/*"]

[tool.hatch.build.targets.wheel]
packages = ["src/pixel_patrol_base"]

[project.scripts]
pixel-patrol = "pixel_patrol_base.cli:cli"

[project.entry-points."pixel_patrol.processor_plugins"]
pixel_patrol_base_processing_builtins = "pixel_patrol_base.plugin_registry:register_processor_plugins"

[project.entry-points."pixel_patrol.viewer_extensions"]
pixel_patrol_base_viewer = "pixel_patrol_base.viewer_extensions:get_viewer_extension_dir"

[dependency-groups]
dev = [
    "pytest>=8.3.5",
    "pytest-mock>=3.14.1",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["tests"]
filterwarnings = [
    "error::DeprecationWarning",
    "error::PendingDeprecationWarning",
]

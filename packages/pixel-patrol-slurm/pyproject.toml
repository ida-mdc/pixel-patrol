[project]
name = "pixel-patrol-slurm"
version = "0.7.0"
description = "SLURM cluster launcher for pixel-patrol"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.11"
dependencies = [
    "pixel-patrol-base==0.7.0",
    "dask-jobqueue>=0.9.0",
    "bokeh>=3.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv]
package = true

[tool.setuptools]
license-files = ["LICENSE", "NOTICE", "THIRD_PARTY_LICENSES.md"]

[tool.hatch.build.targets.wheel]
packages = ["src/pixel_patrol_slurm"]

[project.scripts]
pixel-patrol-slurm = "pixel_patrol_slurm.cli:main"

[tool.uv.sources]
pixel-patrol-base = { path = "../pixel-patrol-base" }

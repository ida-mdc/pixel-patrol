[project]
name = "pixel-patrol"
version = "0.6.0"
description = "Image prevalidation tool - PixelPatrol and its add-ons packages"
readme = "README.md"
license = { file = "LICENSE" }
authors = [
    { name = "Helmholtz Imaging Engineering & Support Unit MDC" }
]
requires-python = ">=3.11"

dependencies = [
    "pixel-patrol-base==0.6.0",
    "pixel-patrol-image==0.6.0",
    "pixel-patrol-loader-bio==0.6.0",
]

[project.urls]
Homepage = "https://ida-mdc.github.io/pixel-patrol/"
Repository = "https://github.com/ida-mdc/pixel-patrol"

[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[tool.uv]
package = true

[tool.setuptools]
license-files = ["LICENSE", "NOTICE", "THIRD_PARTY_LICENSES.md"]

[dependency-groups]
dev = [
    "pytest>=8.3.5",
    "pytest-mock>=3.14.1",
]

[tool.uv.sources]
pixel-patrol-base = { path = "../pixel-patrol-base" }
pixel-patrol-image = { path = "../pixel-patrol-image" }
pixel-patrol-loader-bio = { path = "../pixel-patrol-loader-bio" }

[tool.setuptools.package-data]
"*" = ["readme_assets/*"]
[project]
name = "pixel-patrol-aqqua"
version = "0.7.1"
description = "PixelPatrol add-on package for Aqqua"
readme = "README.md"
license = { file = "LICENSE" }
authors = [
    { name = "Helmholtz Imaging Engineering & Support Unit MDC" }
]
requires-python = ">=3.11"

dependencies = [
    "lmdb==1.7.5",
    "blosc2==4.0.0",
    "pixel-patrol-base==0.7.1",
]

[project.urls]
Homepage = "https://ida-mdc.github.io/pixel-patrol/"
Repository = "https://github.com/ida-mdc/pixel-patrol"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv]
package = true

[tool.setuptools]
license-files = ["LICENSE", "NOTICE", "THIRD_PARTY_LICENSES.md"]

[tool.hatch.build.targets.wheel]
packages = ["src/pixel_patrol_aqqua"]

[project.entry-points."pixel_patrol.loader_plugins"]
pixel_patrol_aqqua_loader_builtins = "pixel_patrol_aqqua.plugin_registry:register_loader_plugins"

[dependency-groups]
dev = [
    "pytest>=8.3.5",
    "pytest-mock>=3.14.1",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.uv.sources]
pixel-patrol-base = { path = "../pixel-patrol-base" }
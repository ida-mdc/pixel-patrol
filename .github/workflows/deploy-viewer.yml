name: Deploy Viewer to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'viewer/**'
      - 'packages/**'
      - '.github/workflows/deploy-viewer.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; don't cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: viewer/package-lock.json

      - name: Build JS viewer
        working-directory: viewer
        run: |
          npm ci
          npm run build

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime packages for extension discovery
        run: |
          python -m pip install --upgrade pip
          pip install \
            -e packages/pixel-patrol-base \
            -e packages/pixel-patrol-loader-bio \
            -e packages/pixel-patrol-image

      - name: Assemble static site from bundled viewer + discovered extensions
        run: python -c "from pixel_patrol_base.viewer_pages import build_github_pages_site; build_github_pages_site('gh-pages-site')"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages-site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

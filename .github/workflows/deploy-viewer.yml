name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'viewer/**'
      - 'packages/**'
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/deploy-viewer.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; don't cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Build the JS viewer first — the vite build syncs viewer/dist/ into
      #    packages/pixel-patrol-base/src/pixel_patrol_base/viewer_dist/ so the
      #    Python package install in the next step picks up the fresh build.
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: viewer/package-lock.json

      - name: Build JS viewer
        working-directory: viewer
        run: |
          npm ci
          npm run build

      # 2. Install Python packages after the viewer is built so that the
      #    editable install of pixel-patrol-base exposes the fresh viewer_dist/.
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"

      - name: Install Python packages
        run: |
          uv pip install --system \
            -e packages/pixel-patrol-base \
            mkdocs-material

      # 3. Build the MkDocs documentation.
      - name: Build docs
        run: mkdocs build --site-dir gh-pages-site/docs

      # 4. Assemble the full site: promote landing page + assets, copy viewer
      #    to /viewer/, and inject installed extension URLs.
      - name: Assemble site
        run: |
          python -c "
          from pixel_patrol_base.viewer_pages import build_github_pages_site
          build_github_pages_site('gh-pages-site')
          "

      - uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages-site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

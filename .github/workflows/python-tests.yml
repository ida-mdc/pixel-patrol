name: Python Tests

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  test-packages:
    name: Test Python Packages
    strategy:
      matrix:
        # If on main (push) OR PR targeting main -> test on 3 OSes, else only ubuntu
        os: ${{ fromJson( (github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main')) && '["ubuntu-latest","windows-latest","macos-latest"]' || '["ubuntu-latest"]' ) }}
        package:
          - pixel-patrol-base
          - pixel-patrol-loader-bio
          - pixel-patrol-image
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    defaults:
      run:
        working-directory: packages/${{ matrix.package }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv and create venv
        run: |
          pip install uv
          uv venv

      - name: Install package dependencies
        run: uv sync --group dev

      - name: Install Chrome and ChromeDriver (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          CHROME_MAJOR_VERSION=$(google-chrome --version | cut -f 3 -d ' ' | cut -f 1 -d '.')
          CHROMEDRIVER_VERSION=$(curl -sS "https://googlechromelabs.github.io/chrome-for-testing/LATEST_RELEASE_${CHROME_MAJOR_VERSION}")
          wget -q -O /tmp/chromedriver.zip "https://storage.googleapis.com/chrome-for-testing-public/${CHROMEDRIVER_VERSION}/linux64/chromedriver-linux64.zip"
          unzip -o /tmp/chromedriver.zip -d /tmp/
          sudo mv /tmp/chromedriver-linux64/chromedriver /usr/local/bin/chromedriver
          sudo chmod +x /usr/local/bin/chromedriver

      - name: Check key package versions
        run: |
          echo "--- All installed packages (check bioio, zarr, imageio, dask versions) ---"
          uv pip freeze

      - name: Run tests
        run: |
          EXTRA_ARGS=""
          if [ "${{ runner.os }}" = "Linux" ] && [ "${{ matrix.package }}" = "pixel-patrol-base" ]; then
            EXTRA_ARGS="--headless"
          fi
          uv run pytest -vv $EXTRA_ARGS
        shell: bash
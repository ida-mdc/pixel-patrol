site_name: Pixel Patrol
site_url: https://ida-mdc.github.io/pixel-patrol/
repo_url: https://github.com/ida-mdc/pixel-patrol
repo_name: ida-mdc/pixel-patrol
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Installation: installation.md
  - Getting Started: quickstart.md
  - CLI Reference: cli.md
  - API: api.md
  - Extensions: extensions.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
